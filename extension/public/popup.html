<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LexTrace NT3</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="popup-shell">
      <header class="shell-header">
        <div>
          <p class="shell-kicker">Среда Edge MV3</p>
          <h1>LexTrace NT3</h1>
        </div>
        <span class="shell-badge" id="status-badge">офлайн</span>
      </header>

      <nav class="tab-strip" aria-label="Вкладки popup">
        <button type="button" class="tab-button is-active" data-tab="control">Управление</button>
        <button type="button" class="tab-button" data-tab="config">Настройки</button>
      </nav>

      <main class="shell-main">
        <section class="tab-panel is-active" data-panel="control">
          <dl class="status-grid">
            <div>
              <dt>Воркер</dt>
              <dd id="worker-running">неизвестно</dd>
            </div>
            <div>
              <dt>ID запуска</dt>
              <dd id="worker-boot">-</dd>
            </div>
            <div>
              <dt>Сессия</dt>
              <dd id="worker-session">-</dd>
            </div>
            <div>
              <dt>Задача</dt>
              <dd id="worker-task">-</dd>
            </div>
          </dl>

          <div class="control-row">
            <button type="button" id="open-terminal" class="terminal-trigger">Открыть терминал</button>
            <span class="terminal-state" id="terminal-state">Проверка текущей страницы…</span>
          </div>
        </section>

        <section class="tab-panel" data-panel="config">
          <div class="config-frame" id="config-frame">
            <div class="config-viewport" id="config-viewport">
              <div class="config-viewer" id="config-viewer" aria-label="JSON-просмотрщик настроек расширения"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
